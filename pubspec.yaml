name: parsel_sorgu
description: 'A new Flutter project.'
publish_to: 'none'

version: 1.1.0+10

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.4.0
  html: ^0.15.6
  url_launcher: ^6.3.2
  flutter_inappwebview: ^6.1.4
  geolocator: ^13.0.0
  receive_sharing_intent: ^1.8.1
  flutter_bloc: ^8.1.6
  equatable: ^2.0.6
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/icon/icon.png'
  min_sdk_android: 21
  web:
    generate: true
    image_path: 'assets/icon/icon.png'
    background_color: '#ffffff'
    theme_color: '#ffffff'
  windows:
    generate: true
    image_path: 'assets/icon/icon.png'
  macos:
    generate: true
    image_path: 'assets/icon/icon.png'

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
